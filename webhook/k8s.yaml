apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook
  labels:
    app: webhook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook
  template:
    metadata:
      labels:
        app: webhook
    spec:
      containers:
      - name: webhook
        image: webhook:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: PORT
          value: "3000"
        - name: SQS_QUEUE_URL
          value: "http://localstack:4566/000000000000/agent-requests"
        - name: AWS_REGION
          value: "us-east-1"
        - name: AWS_ENDPOINT
          value: "http://localstack:4566"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 3
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: webhook
spec:
  type: ClusterIP
  selector:
    app: webhook
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
