apiVersion: v1
kind: ConfigMap
metadata:
  name: localstack-init
  labels:
    app: localstack
data:
  init-sqs.sh: |
    #!/bin/bash
    echo "Creating SQS queue 'agent-requests'..."
    awslocal sqs create-queue --queue-name agent-requests
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: localstack
  labels:
    app: localstack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: localstack
  template:
    metadata:
      labels:
        app: localstack
    spec:
      containers:
      - name: localstack
        image: localstack/localstack:3.8.0
        ports:
        - containerPort: 4566
        env:
        - name: SERVICES
          value: "sqs"
        volumeMounts:
        - name: init-scripts
          mountPath: /etc/localstack/init/ready.d
      volumes:
      - name: init-scripts
        configMap:
          name: localstack-init
          defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: localstack
spec:
  selector:
    app: localstack
  ports:
  - protocol: TCP
    port: 4566
    targetPort: 4566
